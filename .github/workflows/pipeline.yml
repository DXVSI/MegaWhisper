name: MegaWhisper public distribution

run-name: >-
  ${{ format('MegaWhisper {0} {1} dispatch {2}',
      github.event.client_payload.release_payload.tag
        || github.event.client_payload.tag,
      github.event.client_payload.operation,
      github.event.client_payload.release_payload.dispatch_id
        || github.event.client_payload.dispatch_id) }}

on:
  repository_dispatch:
    types:
      - megawhisper-release
      - megawhisper-flatpak-recovery

permissions:
  contents: read

concurrency:
  group: megawhisper-public-distribution
  cancel-in-progress: false

jobs:
  release:
    if: >-
      ${{ github.event.action == 'megawhisper-release'
          && github.event.client_payload.operation == 'release' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FLATPAK_REPO_URL: https://dxvsi.github.io/MegaWhisper
      OPERATION: ${{ github.event.client_payload.operation }}
      PRODUCER_RUN_ID: >-
        ${{ github.event.client_payload.release_payload.producer_run_id
            || github.event.client_payload.producer_run_id }}
      DISPATCH_RUN_ID: >-
        ${{ github.event.client_payload.release_payload.dispatch_run_id
            || github.event.client_payload.dispatch_run_id }}
      DISPATCH_RUN_ATTEMPT: >-
        ${{ github.event.client_payload.release_payload.dispatch_run_attempt
            || github.event.client_payload.dispatch_run_attempt }}
      DISPATCH_ID: >-
        ${{ github.event.client_payload.release_payload.dispatch_id
            || github.event.client_payload.dispatch_id }}
      DISTRIBUTION_SHA: >-
        ${{ github.event.client_payload.release_payload.distribution_sha
            || github.event.client_payload.distribution_sha }}
      RELEASE_TAG: >-
        ${{ github.event.client_payload.release_payload.tag
            || github.event.client_payload.tag }}
      RELEASE_VERSION: >-
        ${{ github.event.client_payload.release_payload.version
            || github.event.client_payload.version }}
      ASSET_SCHEMA: >-
        ${{ github.event.client_payload.release_payload.asset_schema
            || github.event.client_payload.asset_schema }}
      RELEASE_ID: >-
        ${{ github.event.client_payload.release_payload.release_id
            || github.event.client_payload.release_id }}
      ASSET_INVENTORY: >-
        ${{ toJSON(github.event.client_payload.release_payload.assets
            || github.event.client_payload.assets) }}
      EXPECTED_FLATPAK_COMMIT: >-
        ${{ github.event.client_payload.release_payload.flatpak_commit
            || github.event.client_payload.flatpak_commit }}
      EXPECTED_ROLLBACK_COMMIT: >-
        ${{ github.event.client_payload.release_payload.rollback_commit
            || github.event.client_payload.rollback_commit }}
    steps:
      - name: Validate immutable dispatch identity
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ "$OPERATION" != release \
                || ! "$PRODUCER_RUN_ID" =~ ^[1-9][0-9]*$ \
                || ! "$DISPATCH_RUN_ID" =~ ^[1-9][0-9]*$ \
                || ! "$DISPATCH_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ \
                || "$DISPATCH_ID" \
                    != "$DISPATCH_RUN_ID-$DISPATCH_RUN_ATTEMPT-release" \
                || ! "$DISTRIBUTION_SHA" =~ ^[0-9a-f]{40}$ \
                || ! "$RELEASE_TAG" \
                    =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ \
                || "v$RELEASE_VERSION" != "$RELEASE_TAG" \
                || ! "$EXPECTED_FLATPAK_COMMIT" =~ ^[0-9a-f]{64}$ \
                || ! "$EXPECTED_ROLLBACK_COMMIT" \
                    =~ ^(none|[0-9a-f]{64})$ ]]; then
            echo "Invalid public release dispatch payload" >&2
            exit 64
          fi
          if [[ "$GITHUB_REPOSITORY" != DXVSI/MegaWhisper ]]; then
            echo "Public distribution workflow is running in an unexpected repository" >&2
            exit 65
          fi
          IFS=. read -r version_major version_minor _ <<< "$RELEASE_VERSION"
          if [[ "$ASSET_SCHEMA" != binary-v1 \
                || ! "$RELEASE_ID" =~ ^[1-9][0-9]*$ \
                || "$ASSET_INVENTORY" == null ]] \
              || (( 10#$version_major < 2 \
                    || (10#$version_major == 2 && 10#$version_minor < 1) )); then
            echo "Unsupported release asset schema/version pair" >&2
            exit 64
          fi

      - name: Checkout protected public distribution verifiers
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.DISTRIBUTION_SHA }}
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Install distribution verification tooling
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            binutils curl flatpak gnupg jq libxml2-utils ostree zstd
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          platform_commit=8d76cf000aa3ea5994b96e9de32bfdb07049213df3c4a1a72af311ebec5e2647
          sudo flatpak install -y --noninteractive \
            flathub org.kde.Platform//6.11
          sudo flatpak update -y --noninteractive \
            --commit="$platform_commit" runtime/org.kde.Platform/x86_64/6.11
          [[ "$(flatpak info --system --show-commit \
            org.kde.Platform 6.11)" == "$platform_commit" ]]

      - id: state
        name: Verify distribution tag, draft assets and signed repository states
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          # shellcheck disable=SC2153
          checked_out_distribution_sha="$(git rev-parse 'HEAD^{commit}')"
          if [[ "$checked_out_distribution_sha" != "$DISTRIBUTION_SHA" ]]; then
            echo "Checked-out public distribution source differs from dispatch" >&2
            exit 65
          fi
          git fetch --force --no-tags origin \
            "+refs/heads/main:refs/remotes/origin/main"
          if ! git merge-base --is-ancestor \
              "$DISTRIBUTION_SHA" refs/remotes/origin/main; then
            echo "Dispatched public distribution source is not in main" >&2
            exit 65
          fi
          # shellcheck disable=SC2153
          git fetch --force --no-tags origin \
            "+refs/tags/$RELEASE_TAG:refs/ci/distribution-tag"
          distribution_tag_commit="$(git rev-parse \
            'refs/ci/distribution-tag^{commit}')"
          remote_tag_type="$(git cat-file -t refs/ci/distribution-tag)"
          remote_tag_sha="$(git rev-parse refs/ci/distribution-tag)"
          if [[ "$distribution_tag_commit" != "$DISTRIBUTION_SHA" \
                || "$remote_tag_type" != commit \
                || "$remote_tag_sha" != "$DISTRIBUTION_SHA" ]]; then
            echo "Public release tag does not match the pinned distribution commit" >&2
            exit 65
          fi
          tag_tree="$(git ls-tree -r --name-only refs/ci/distribution-tag)"
          if grep -Eiq '(^|/)(src|tests?|external)(/|$)|\.(c|cpp|cc|cxx|h|hh|hpp|pro|ui|qrc)$|(^|/)CMakeLists\.txt$|(^|/)SOURCE[-_]GRAPH\.txt$' \
              <<< "$tag_tree" \
              || grep -Eq \
                "(^|/)MegaWhisper-$RELEASE_VERSION-source\\.tar\\.zst$|(^|/)MegaWhisper-Source-$RELEASE_VERSION\\.spdx\\.json$" \
                <<< "$tag_tree"; then
            echo "Public distribution tag contains application source material" >&2
            exit 65
          fi

          # shellcheck disable=SC2153
          release_json="$(gh api \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")"
          if [[ -z "$release_json" ]]; then
            echo "Public release list did not return one exact release" >&2
            exit 65
          fi
          if ! jq -e \
              'has("draft") and ((.draft | type) == "boolean")
               and has("prerelease")
               and ((.prerelease | type) == "boolean")' \
              <<< "$release_json" >/dev/null; then
            echo "Public release returned invalid state types" >&2
            exit 65
          fi
          release_id="$(jq -r '.id // empty' <<< "$release_json")"
          is_draft="$(jq -r '.draft' <<< "$release_json")"
          is_prerelease="$(jq -r '.prerelease' <<< "$release_json")"
          release_tag="$(jq -r '.tag_name // empty' <<< "$release_json")"
          release_target="$(jq -r '.target_commitish // empty' \
            <<< "$release_json")"
          if [[ "$is_prerelease" != false || "$release_tag" != "$RELEASE_TAG" \
                || ! "$release_id" =~ ^[1-9][0-9]*$ \
                || "$release_id" != "$RELEASE_ID" \
                || "$release_target" != "$DISTRIBUTION_SHA" \
                || ( "$is_draft" != true && "$is_draft" != false ) ]]; then
            echo "Public release has an invalid identity or state" >&2
            exit 65
          fi

          expected_assets="$(scripts/ci/list-release-assets.sh \
            "$RELEASE_VERSION" release)"
          api_asset_names="$(jq -r '.assets[].name' <<< "$release_json" \
            | LC_ALL=C sort)"
          api_asset_inventory="$(jq -Sc '
            [.assets[]
              | {
                  id: .id,
                  name: .name,
                  size: .size,
                  digest: .digest
                }
            ] | sort_by(.name)' <<< "$release_json")"
          if [[ "$api_asset_names" != "$expected_assets" ]]; then
            echo "Public release API inventory does not match $ASSET_SCHEMA" >&2
            exit 65
          fi
          dispatched_asset_inventory="$(jq -Sc 'sort_by(.name)' \
            <<< "$ASSET_INVENTORY")"
          if [[ "$dispatched_asset_inventory" != "$api_asset_inventory" ]] \
              || ! jq -e '
                length == 10
                and all(.[];
                  (.id | type) == "number" and .id > 0
                  and (.name | type) == "string"
                  and (.name | test("^[A-Za-z0-9][A-Za-z0-9._+-]*$"))
                  and (.size | type) == "number" and .size > 0
                  and (.digest | type) == "string"
                  and (.digest | test("^sha256:[0-9a-f]{64}$")))' \
                <<< "$dispatched_asset_inventory" >/dev/null; then
            echo "Public release API inventory differs from dispatch" >&2
            exit 65
          fi

          mkdir -p release-assets
          asset_count="$(jq '.assets | length' <<< "$release_json")"
          unique_asset_count="$(jq '[.assets[].name] | unique | length' \
            <<< "$release_json")"
          if [[ "$asset_count" != 10 || "$unique_asset_count" != 10 ]]; then
            echo "Public release asset inventory is empty or ambiguous" >&2
            exit 65
          fi
          while IFS=$'\t' read -r asset_id asset_name asset_state asset_size \
              asset_digest; do
            if [[ ! "$asset_id" =~ ^[1-9][0-9]*$ \
                  || ! "$asset_name" \
                      =~ ^[A-Za-z0-9][A-Za-z0-9._+-]*$ \
                  || "$asset_state" != uploaded \
                  || ! "$asset_size" =~ ^[1-9][0-9]*$ \
                  || ! "$asset_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Public release contains an invalid asset entry" >&2
              exit 65
            fi
            asset_path="release-assets/$asset_name"
            asset_downloaded=0
            for attempt in 1 2 3; do
              echo "Downloading $asset_name, attempt $attempt of 3"
              rm -f "$asset_path"
              if gh api --header 'Accept: application/octet-stream' \
                    "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
                    > "$asset_path" \
                  && [[ "$(stat -c '%s' "$asset_path")" == "$asset_size" ]] \
                  && [[ "sha256:$(sha256sum "$asset_path" \
                        | awk '{print $1}')" == "$asset_digest" ]]; then
                asset_downloaded=1
                break
              fi
            done
            if [[ "$asset_downloaded" -ne 1 ]]; then
              echo "Public release asset remained unavailable: $asset_name" >&2
              exit 69
            fi
          done < <(
            jq -r '.assets[]
              | [.id, .name, .state, .size, .digest]
              | @tsv' <<< "$release_json"
          )
          actual_assets="$(find release-assets -maxdepth 1 -type f \
            -printf '%f\n' | LC_ALL=C sort)"
          if [[ "$actual_assets" != "$expected_assets" ]]; then
            echo "Public release asset inventory is not exact" >&2
            diff -u <(printf '%s\n' "$expected_assets") \
              <(printf '%s\n' "$actual_assets") || true
            exit 65
          fi

          fingerprint="$(tr -d '[:space:]' < RELEASE_KEY_FINGERPRINT \
            | tr '[:lower:]' '[:upper:]')"
          if [[ ! "$fingerprint" =~ ^([0-9A-F]{40}|[0-9A-F]{64})$ ]]; then
            echo "Pinned release fingerprint has an invalid format" >&2
            exit 65
          fi
          scripts/ci/verify-release-signatures.sh \
            release-assets "$RELEASE_VERSION" "$ASSET_SCHEMA" "$fingerprint"

          compliance_root=third-party-compliance-assets
          mkdir -p "$compliance_root"
          scripts/ci/release-bundles.sh extract third-party-compliance \
            "$RELEASE_VERSION" \
            "release-assets/MegaWhisper-$RELEASE_VERSION-third-party-compliance.tar.zst" \
            "$compliance_root"
          if grep -REqI \
              -e 'SOURCE[-_]GRAPH\.txt' \
              -e "MegaWhisper-$RELEASE_VERSION-source\\.tar\\.zst" \
              -e "MegaWhisper-Source-$RELEASE_VERSION\\.spdx\\.json" \
              -e '(^|["[:space:]])[a-z_]*source[a-z_]*sha["=:]' \
              -e '/home/(runner|dx)/' \
              -e '/__w/[^/]+/[^/]+' "$compliance_root"; then
            echo "Third-party compliance metadata exposes application source identity" >&2
            exit 65
          fi

          recovery_root=recovery-assets
          mkdir -p "$recovery_root"
          scripts/ci/release-bundles.sh extract recovery \
            "$RELEASE_VERSION" \
            "release-assets/MegaWhisper-$RELEASE_VERSION-recovery.tar.zst" \
            "$recovery_root"
          recovery_metadata="$recovery_root/flatpak-pages-recovery.txt"
          metadata_format="$(awk -F= '$1 == "format" { print $2 }' \
            "$recovery_metadata")"
          metadata_asset_schema="$(awk -F= \
            '$1 == "asset_schema" { print $2 }' "$recovery_metadata")"
          metadata_run_id="$(awk -F= '$1 == "producer_run_id" { print $2 }' \
            "$recovery_metadata")"
          metadata_repository="$(awk -F= \
            '$1 == "release_repository" { print $2 }' "$recovery_metadata")"
          metadata_version="$(awk -F= '$1 == "version" { print $2 }' \
            "$recovery_metadata")"
          metadata_commit="$(awk -F= '$1 == "flatpak_commit" { print $2 }' \
            "$recovery_metadata")"
          metadata_distribution="$(awk -F= \
            '$1 == "distribution_sha" { print $2 }' "$recovery_metadata")"
          site_archive_sha="$(awk -F= \
            '$1 == "site_archive_sha256" { print $2 }' \
            "$recovery_metadata")"
          metadata_rollback="$(awk -F= '$1 == "rollback_commit" { print $2 }' \
            "$recovery_metadata")"
          rollback_archive_sha="$(awk -F= \
            '$1 == "rollback_archive_sha256" { print $2 }' "$recovery_metadata")"
          rollback_distribution="$(awk -F= \
            '$1 == "rollback_distribution_sha" { print $2 }' \
            "$recovery_metadata")"
          rollback_site_archive_sha="$(awk -F= \
            '$1 == "rollback_site_archive_sha256" { print $2 }' \
            "$recovery_metadata")"
          if [[ "$metadata_format" != 5 \
                || "$metadata_asset_schema" != binary-v1 \
                || "$metadata_run_id" != "$PRODUCER_RUN_ID" \
                || "$metadata_repository" != "$GITHUB_REPOSITORY" \
                || "$metadata_version" != "$RELEASE_VERSION" \
                || "$metadata_commit" != "$EXPECTED_FLATPAK_COMMIT" \
                || "$metadata_distribution" != "$DISTRIBUTION_SHA" \
                || ! "$site_archive_sha" =~ ^[0-9a-f]{64}$ \
                || "$metadata_rollback" != "$EXPECTED_ROLLBACK_COMMIT" \
                || ! "$rollback_archive_sha" =~ ^[0-9a-f]{64}$ \
                || ! "$rollback_distribution" =~ ^[0-9a-f]{40}$ \
                || ! "$rollback_site_archive_sha" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Signed Flatpak deployment metadata does not match the dispatch" >&2
            exit 65
          fi

          scripts/ci/verify-pages-recovery.sh \
            "$recovery_root" candidate-repo candidate-site \
            "$fingerprint" "$PRODUCER_RUN_ID" strict
          scripts/ci/verify-flatpak-release-repo.sh candidate-repo stable

          binary_scan_root="$GITHUB_WORKSPACE/binary-scan"
          install -d -m 0755 "$binary_scan_root/appimage"
          appimage_asset="$GITHUB_WORKSPACE/release-assets/MegaWhisper-$RELEASE_VERSION-x86_64.AppImage"
          chmod 0755 "$appimage_asset"
          (
            cd "$binary_scan_root/appimage"
            "$appimage_asset" --appimage-extract >/dev/null
          )
          ostree checkout -U --repo=candidate-repo \
            "$EXPECTED_FLATPAK_COMMIT" "$binary_scan_root/flatpak"
          scripts/ci/verify-binary-release-content.sh \
            "$RELEASE_VERSION" release-assets \
            "$binary_scan_root/appimage/squashfs-root" \
            "$binary_scan_root/flatpak"

          install -m 0644 "$recovery_metadata" \
            candidate-repo/flatpak-active-state.txt
          install -m 0644 "$recovery_metadata.asc" \
            candidate-repo/flatpak-active-state.txt.asc
          install -m 0644 "$recovery_root/megawhisper-release-key.asc" \
            candidate-repo/megawhisper-release-key.asc

          rollback_archive="$recovery_root/MegaWhisper-flatpak-rollback-repo.tar.zst"
          actual_rollback_archive_sha="$(sha256sum "$rollback_archive" \
            | awk '{print $1}')"
          if [[ "$actual_rollback_archive_sha" != "$rollback_archive_sha" ]]; then
            echo "Rollback archive differs from signed deployment metadata" >&2
            exit 65
          fi
          scripts/ci/extract-recovery-archive.sh \
            "$rollback_archive" rollback-repo
          ostree fsck --repo=rollback-repo
          rollback_ref="$(ostree rev-parse --repo=rollback-repo \
            app/io.github.dxvsi.megawhisper/x86_64/stable 2>/dev/null || true)"
          if [[ "$EXPECTED_ROLLBACK_COMMIT" == none ]]; then
            if [[ -n "$rollback_ref" ]]; then
              echo "First-release rollback unexpectedly exposes an app commit" >&2
              exit 65
            fi
          elif [[ "$rollback_ref" != "$EXPECTED_ROLLBACK_COMMIT" ]]; then
            echo "Rollback repository does not expose the expected commit" >&2
            exit 65
          fi
          if [[ "$EXPECTED_ROLLBACK_COMMIT" == none ]]; then
            scripts/ci/verify-flatpak-release-repo.sh rollback-repo empty
          else
            scripts/ci/verify-flatpak-release-repo.sh rollback-repo stable
          fi

          rollback_site_archive="$recovery_root/MegaWhisper-pages-rollback-site.tar.zst"
          actual_rollback_site_archive_sha="$(sha256sum \
            "$rollback_site_archive" | awk '{print $1}')"
          if [[ "$actual_rollback_site_archive_sha" \
                != "$rollback_site_archive_sha" ]]; then
            echo "Rollback site archive differs from signed metadata" >&2
            exit 65
          fi
          scripts/ci/extract-recovery-archive.sh \
            "$rollback_site_archive" rollback-site
          scripts/ci/verify-pages-site.sh rollback-site rollback manifest

          scripts/ci/assemble-pages-state.sh \
            candidate-site candidate-repo candidate-pages \
            "$EXPECTED_FLATPAK_COMMIT" release
          scripts/ci/assemble-pages-state.sh \
            rollback-site rollback-repo rollback-pages \
            "$EXPECTED_ROLLBACK_COMMIT" rollback
          {
            if [[ "$is_draft" == true ]]; then
              echo "mode=deploy"
            else
              echo "mode=reconciled"
            fi
            echo "release_id=$release_id"
            echo "fingerprint=$fingerprint"
            echo "distribution_sha=$metadata_distribution"
          } >> "$GITHUB_OUTPUT"

      - name: Install and smoke-test the signed candidate locally
        shell: bash
        run: |
          set -Eeuo pipefail
          state_root="$(mktemp -d)"
          trap 'rm -rf "$state_root"' EXIT
          export HOME="$state_root/home"
          export XDG_DATA_HOME="$state_root/data"
          export XDG_CONFIG_HOME="$state_root/config"
          export XDG_CACHE_HOME="$state_root/cache"
          export XDG_RUNTIME_DIR="$state_root/runtime"
          install -d -m 0700 "$HOME" "$XDG_DATA_HOME" "$XDG_CONFIG_HOME" \
            "$XDG_CACHE_HOME" "$XDG_RUNTIME_DIR"
          flatpak remote-add --user \
            --gpg-import=release-assets/megawhisper-release-key.asc \
            candidate "file://$GITHUB_WORKSPACE/candidate-repo"
          flatpak install --user -y --noninteractive \
            candidate io.github.dxvsi.megawhisper
          installed_commit="$(flatpak info --user --show-commit \
            io.github.dxvsi.megawhisper)"
          if [[ "$installed_commit" != "$EXPECTED_FLATPAK_COMMIT" ]]; then
            echo "Installed candidate commit is invalid" >&2
            exit 65
          fi
          permissions="$(flatpak info --user --show-permissions \
            io.github.dxvsi.megawhisper)"
          printf '%s\n' "$permissions" | scripts/ci/check-flatpak-permissions.sh
          for smoke_argument in --identity-smoke-test --smoke-test \
            --ui-smoke-test --media-smoke-test; do
            timeout 60s flatpak run --user \
              --env=G_DEBUG=fatal-criticals \
              --env=QT_QPA_PLATFORM=offscreen \
              io.github.dxvsi.megawhisper "$smoke_argument"
          done

      - name: Configure public GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload verified site and stable repository
        if: steps.state.outputs.mode == 'deploy'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: pages-stable-${{ github.run_attempt }}
          path: candidate-pages
          include-hidden-files: true

      - name: Upload exact previous Pages state
        if: steps.state.outputs.mode == 'deploy'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: pages-rollback-${{ github.run_attempt }}
          path: rollback-pages
          include-hidden-files: true

      - id: deployment
        name: Deploy verified site and stable repository
        if: steps.state.outputs.mode == 'deploy'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: pages-stable-${{ github.run_attempt }}

      - name: Verify promoted or previously published full Pages state
        if: >-
          ${{ steps.state.outputs.mode == 'deploy'
              || steps.state.outputs.mode == 'reconciled' }}
        shell: bash
        env:
          FINGERPRINT: ${{ steps.state.outputs.fingerprint }}
        run: |
          set -Eeuo pipefail
          pages_verified=0
          deadline=$((SECONDS + 180))
          for attempt in $(seq 1 12); do
            echo "Checking stable Pages state, attempt $attempt of 12"
            if scripts/ci/verify-live-pages-state.sh \
                "$FLATPAK_REPO_URL" candidate-pages candidate-site \
                "$FINGERPRINT" \
                "$EXPECTED_FLATPAK_COMMIT" \
                "$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-stable-$attempt" \
                release; then
              pages_verified=1
              break
            fi
            if (( SECONDS >= deadline )); then
              break
            fi
            sleep 5
          done
          if [[ "$pages_verified" -ne 1 ]]; then
            echo "Stable Pages state differs from the signed candidate" >&2
            exit 65
          fi

      - name: Install and verify the recommended signed Flatpak ref
        if: >-
          ${{ steps.state.outputs.mode == 'deploy'
              || steps.state.outputs.mode == 'reconciled' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          state_root="$(mktemp -d)"
          trap 'rm -rf "$state_root"' EXIT
          export HOME="$state_root/home"
          export XDG_DATA_HOME="$state_root/data"
          export XDG_CONFIG_HOME="$state_root/config"
          export XDG_CACHE_HOME="$state_root/cache"
          export XDG_RUNTIME_DIR="$state_root/runtime"
          install -d -m 0700 "$HOME" "$XDG_DATA_HOME" "$XDG_CONFIG_HOME" \
            "$XDG_CACHE_HOME" "$XDG_RUNTIME_DIR"
          release_flatpak_ref=release-assets/io.github.dxvsi.megawhisper.flatpakref
          live_flatpak_ref="$state_root/io.github.dxvsi.megawhisper.flatpakref"
          curl --fail --silent --show-error --location \
            --proto '=https' --tlsv1.2 \
            --retry 3 --retry-all-errors --retry-delay 1 \
            --connect-timeout 10 --max-time 60 \
            --output "$live_flatpak_ref" \
            "$FLATPAK_REPO_URL/io.github.dxvsi.megawhisper.flatpakref?megawhisper_install=$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          if ! cmp --silent "$release_flatpak_ref" "$live_flatpak_ref"; then
            echo "Published Flatpak ref differs from the signed Release asset" >&2
            exit 65
          fi
          grep -Fxq "Url=$FLATPAK_REPO_URL" "$live_flatpak_ref"
          flatpak install --user -y --noninteractive "$live_flatpak_ref"
          installed_commit="$(flatpak info --user --show-commit \
            io.github.dxvsi.megawhisper)"
          if [[ "$installed_commit" != "$EXPECTED_FLATPAK_COMMIT" ]]; then
            echo "Flatpak ref installed an unexpected commit" >&2
            exit 65
          fi
          permissions="$(flatpak info --user --show-permissions \
            io.github.dxvsi.megawhisper)"
          printf '%s\n' "$permissions" \
            | scripts/ci/check-flatpak-permissions.sh
          identity_output="$(timeout 60s flatpak run --user \
            --env=QT_QPA_PLATFORM=offscreen \
            io.github.dxvsi.megawhisper --identity-smoke-test)"
          expected_identity='identity-smoke: app_id=io.github.dxvsi.megawhisper; package_kind=flatpak; desktop_id=io.github.dxvsi.megawhisper'
          if [[ "$identity_output" != "$expected_identity" ]]; then
            echo "Flatpak ref installed an unexpected application identity" >&2
            exit 65
          fi
          for smoke_argument in --tls-trust-smoke-test \
            --tls-network-smoke-test --smoke-test --ui-smoke-test \
            --media-smoke-test; do
            timeout 60s flatpak run --user \
              --env=G_DEBUG=fatal-criticals \
              --env=QT_QPA_PLATFORM=offscreen \
              io.github.dxvsi.megawhisper "$smoke_argument"
          done
          if ! flatpak remotes --user --columns=url \
              | sed 's#/$##' \
              | grep -Fxq "${FLATPAK_REPO_URL%/}"; then
            echo "Flatpak ref did not configure the signed stable update channel" >&2
            exit 65
          fi

      - id: publish
        name: Publish draft release after stable verification
        if: steps.state.outputs.mode == 'deploy'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.state.outputs.release_id }}
        run: |
          set -Eeuo pipefail
          echo "state=pre-mutation" >> "$GITHUB_OUTPUT"
          # shellcheck disable=SC2153
          release_id="$RELEASE_ID"
          if [[ ! "$release_id" =~ ^[1-9][0-9]*$ ]]; then
            echo "Public release ID is invalid" >&2
            exit 65
          fi
          fetch_exact_release() {
            local attempt candidate
            for attempt in 1 2 3; do
              echo "Fetching exact public release, attempt $attempt of 3" >&2
              if candidate="$(gh api \
                  "repos/$GITHUB_REPOSITORY/releases/$release_id")" \
                  && jq -e 'type == "object"' <<< "$candidate" >/dev/null; then
                printf '%s' "$candidate"
                return 0
              fi
              if [[ "$attempt" -lt 3 ]]; then
                sleep "$attempt"
              fi
            done
            return 1
          }
          release_json="$(fetch_exact_release)" || {
            echo "Exact public release remained unavailable" >&2
            exit 69
          }
          if ! jq -e --argjson id "$release_id" --arg tag "$RELEASE_TAG" '
              .id == $id and .tag_name == $tag
            ' <<< "$release_json" >/dev/null; then
            echo "Public release identity changed before publication" >&2
            exit 65
          fi
          if ! jq -e \
              'has("draft") and ((.draft | type) == "boolean")
               and has("prerelease")
               and ((.prerelease | type) == "boolean")' \
              <<< "$release_json" >/dev/null; then
            echo "Public release returned invalid state types" >&2
            exit 65
          fi
          current_asset_inventory="$(jq -Sc '
            [.assets[]
              | {
                  id: .id,
                  name: .name,
                  size: .size,
                  digest: .digest
                }
            ] | sort_by(.name)' <<< "$release_json")"
          dispatched_asset_inventory="$(jq -Sc 'sort_by(.name)' \
            <<< "$ASSET_INVENTORY")"
          if [[ "$current_asset_inventory" \
                  != "$dispatched_asset_inventory" ]] \
              || ! jq -e '
                (.assets | length) == 10
                and ([.assets[].name] | unique | length) == 10
                and all(.assets[];
                  .state == "uploaded"
                  and (.id | type) == "number" and .id > 0
                  and (.name | type) == "string"
                  and (.name | test("^[A-Za-z0-9][A-Za-z0-9._+-]*$"))
                  and (.size | type) == "number" and .size > 0
                  and (.digest | type) == "string"
                  and (.digest | test("^sha256:[0-9a-f]{64}$")))' \
                <<< "$release_json" >/dev/null; then
            echo "Public release assets changed after verification" >&2
            exit 65
          fi
          current_draft="$(jq -r '.draft' <<< "$release_json")"
          target_commitish="$(jq -r '.target_commitish // empty' \
            <<< "$release_json")"
          if [[ "$target_commitish" != "$DISTRIBUTION_SHA" ]]; then
            echo "Public release target commitish is invalid" >&2
            exit 65
          fi
          if [[ "$current_draft" == false ]]; then
            echo "state=published" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$current_draft" != true ]]; then
            echo "Public release draft state is invalid" >&2
            exit 65
          fi
          published_tags="$(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[]
              | select(.draft == false and .prerelease == false
                and (.tag_name
                  | test("^v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$")))
              | .tag_name')"
          highest_tag="$(printf '%s\n%s\n' "$RELEASE_TAG" "$published_tags" \
            | sed '/^$/d' | LC_ALL=C sort -V | tail -n 1)"
          if [[ "$highest_tag" != "$RELEASE_TAG" ]]; then
            echo "Refusing to publish a site release older than the current stable release" >&2
            exit 65
          fi
          echo "state=unknown" >> "$GITHUB_OUTPUT"
          set +e
          gh api --method PATCH \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$DISTRIBUTION_SHA" \
              -F draft=false \
              -F prerelease=false \
              -f make_latest=true \
              > "$RUNNER_TEMP/megawhisper-publish-response.json"
          patch_status=$?
          set -e
          if [[ "$patch_status" -ne 0 ]]; then
            echo "Release publication request failed; reading back exact state" >&2
          fi

          observed_state=unknown
          for attempt in 1 2 3 4 5; do
            echo "Reading back public release state, attempt $attempt of 5" >&2
            if observed_release="$(gh api \
                  "repos/$GITHUB_REPOSITORY/releases/$release_id")" \
                && jq -e \
                  --argjson id "$release_id" \
                  --arg tag "$RELEASE_TAG" \
                  --arg target "$DISTRIBUTION_SHA" '
                  .id == $id
                  and .tag_name == $tag
                  and .target_commitish == $target
                  and has("draft") and ((.draft | type) == "boolean")
                  and has("prerelease")
                  and ((.prerelease | type) == "boolean")
                ' <<< "$observed_release" >/dev/null; then
              observed_asset_inventory="$(jq -Sc '
                [.assets[]
                  | {
                      id: .id,
                      name: .name,
                      size: .size,
                      digest: .digest
                    }
                ] | sort_by(.name)' <<< "$observed_release")"
              if [[ "$observed_asset_inventory" \
                    != "$dispatched_asset_inventory" ]]; then
                observed_state=unknown
                if [[ "$attempt" -lt 5 ]]; then
                  sleep "$attempt"
                fi
                continue
              fi
              observed_draft="$(jq -r '.draft' <<< "$observed_release")"
              observed_prerelease="$(jq -r '.prerelease' \
                <<< "$observed_release")"
              if [[ "$observed_draft" == false \
                    && "$observed_prerelease" == false ]]; then
                observed_state=published
                break
              fi
              if [[ "$observed_draft" == true ]]; then
                observed_state=draft
              else
                observed_state=unknown
              fi
            else
              observed_state=unknown
            fi
            if [[ "$attempt" -lt 5 ]]; then
              sleep "$attempt"
            fi
          done
          if [[ "$observed_state" == published ]]; then
            echo "state=published" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$observed_state" == draft ]]; then
            echo "state=draft" >> "$GITHUB_OUTPUT"
            echo "Release remained a draft; previous Pages state may be restored" >&2
            exit 75
          fi
          echo "state=unknown" >> "$GITHUB_OUTPUT"
          echo "Release publication state is ambiguous; automatic rollback is suppressed" >&2
          exit 75

      - name: Reconcile and verify exact latest stable release identity
        if: >-
          ${{ steps.state.outputs.mode == 'reconciled'
              || (steps.state.outputs.mode == 'deploy'
                  && steps.publish.outcome == 'success') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.state.outputs.release_id }}
        run: |
          set -Eeuo pipefail
          # shellcheck disable=SC2153
          release_id="$RELEASE_ID"
          if [[ ! "$release_id" =~ ^[1-9][0-9]*$ ]]; then
            echo "Public release ID is invalid" >&2
            exit 65
          fi
          dispatched_asset_inventory="$(jq -Sc 'sort_by(.name)' \
            <<< "$ASSET_INVENTORY")"
          exact_release="$(gh api \
            "repos/$GITHUB_REPOSITORY/releases/$release_id")"
          if ! jq -e \
              --argjson id "$release_id" \
              --arg tag "$RELEASE_TAG" \
              --arg target "$DISTRIBUTION_SHA" '
              .id == $id
              and .tag_name == $tag
              and .target_commitish == $target
              and .draft == false
              and .prerelease == false
              and (.assets | length) == 10
            ' <<< "$exact_release" >/dev/null; then
            echo "Published release identity changed before latest reconciliation" >&2
            exit 65
          fi
          exact_asset_inventory="$(jq -Sc '
            [.assets[]
              | {
                  id: .id,
                  name: .name,
                  size: .size,
                  digest: .digest
                }
            ] | sort_by(.name)' <<< "$exact_release")"
          if [[ "$exact_asset_inventory" != "$dispatched_asset_inventory" ]]; then
            echo "Published release assets changed before latest reconciliation" >&2
            exit 65
          fi

          published_tags="$(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[]
              | select(.draft == false and .prerelease == false
                and (.tag_name
                  | test("^v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$")))
              | .tag_name')"
          if [[ "$(grep -Fxc "$RELEASE_TAG" <<< "$published_tags")" -ne 1 ]]; then
            echo "Published release list does not contain one exact candidate" >&2
            exit 65
          fi
          highest_tag="$(printf '%s\n' "$published_tags" \
            | sed '/^$/d' | LC_ALL=C sort -V | tail -n 1)"
          if [[ "$highest_tag" != "$RELEASE_TAG" ]]; then
            echo "Refusing to replace a newer stable release as latest" >&2
            exit 65
          fi

          set +e
          gh api --method PATCH \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -f tag_name="$RELEASE_TAG" \
            -f target_commitish="$DISTRIBUTION_SHA" \
            -F draft=false \
            -F prerelease=false \
            -f make_latest=true \
            > "$RUNNER_TEMP/megawhisper-latest-response.json"
          latest_patch_status=$?
          set -e
          if [[ "$latest_patch_status" -ne 0 ]]; then
            echo "Latest reconciliation request failed; reading back exact state" >&2
          fi
          latest_verified=0
          for attempt in 1 2 3 4 5; do
            echo "Checking latest stable release, attempt $attempt of 5"
            if latest_release="$(gh api \
                  "repos/$GITHUB_REPOSITORY/releases/latest")" \
                && jq -e \
                  --argjson id "$release_id" \
                  --arg tag "$RELEASE_TAG" \
                  --arg target "$DISTRIBUTION_SHA" '
                  .id == $id
                  and .tag_name == $tag
                  and .target_commitish == $target
                  and .draft == false
                  and .prerelease == false
                  and (.assets | length) == 10
                ' <<< "$latest_release" >/dev/null; then
              latest_asset_inventory="$(jq -Sc '
                [.assets[]
                  | {
                      id: .id,
                      name: .name,
                      size: .size,
                      digest: .digest
                    }
                ] | sort_by(.name)' <<< "$latest_release")"
              if [[ "$latest_asset_inventory" \
                    == "$dispatched_asset_inventory" ]]; then
                latest_verified=1
                break
              fi
            fi
            if [[ "$attempt" -lt 5 ]]; then
              sleep "$attempt"
            fi
          done
          if [[ "$latest_verified" -ne 1 ]]; then
            echo "Latest stable release does not resolve to the published candidate" >&2
            exit 65
          fi

      - id: rollback-deployment
        name: Restore the exact previous Pages state after failed deployment
        if: >-
          ${{ failure()
              && steps.state.outputs.mode == 'deploy'
              && (steps.deployment.outcome == 'success'
                  || steps.deployment.outcome == 'failure')
              && steps.publish.outputs.state != 'published'
              && steps.publish.outputs.state != 'unknown' }}
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: pages-rollback-${{ github.run_attempt }}

      - name: Verify automatic rollback
        if: ${{ failure() && steps.rollback-deployment.outcome == 'success' }}
        shell: bash
        env:
          FINGERPRINT: ${{ steps.state.outputs.fingerprint }}
        run: |
          set -Eeuo pipefail
          scripts/ci/verify-live-pages-state.sh \
            "$FLATPAK_REPO_URL" rollback-pages rollback-site "$FINGERPRINT" \
            "$EXPECTED_ROLLBACK_COMMIT" \
            "$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-rollback" rollback

  recover:
    if: >-
      ${{ github.event.action == 'megawhisper-flatpak-recovery'
          && (github.event.client_payload.operation == 'restore'
              || github.event.client_payload.operation == 'rollback') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.recovery-deployment.outputs.page_url }}
    env:
      FLATPAK_REPO_URL: https://dxvsi.github.io/MegaWhisper
    steps:
      - name: Checkout protected public recovery verifiers
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Install recovery verification tooling
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            curl flatpak gnupg jq libxml2-utils ostree zstd

      - id: recovery-state
        name: Verify and stage requested signed state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OPERATION: ${{ github.event.client_payload.operation }}
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
          ASSET_SCHEMA: ${{ github.event.client_payload.asset_schema }}
          RELEASE_ID: ${{ github.event.client_payload.release_id }}
          ASSET_INVENTORY: ${{ toJSON(github.event.client_payload.assets) }}
          DISPATCH_RUN_ID: ${{ github.event.client_payload.dispatch_run_id }}
          DISPATCH_RUN_ATTEMPT: ${{ github.event.client_payload.dispatch_run_attempt }}
          DISPATCH_ID: ${{ github.event.client_payload.dispatch_id }}
          PRODUCER_RUN_ID: ${{ github.event.client_payload.producer_run_id }}
          EXPECTED_COMMIT: ${{ github.event.client_payload.flatpak_commit }}
        run: |
          set -Eeuo pipefail
          # shellcheck disable=SC2153
          if [[ "$OPERATION" != restore && "$OPERATION" != rollback \
                || ! "$RELEASE_TAG" \
                    =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ \
                || "v$RELEASE_VERSION" != "$RELEASE_TAG" \
                || ! "$DISPATCH_RUN_ID" =~ ^[1-9][0-9]*$ \
                || ! "$DISPATCH_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ \
                || "$DISPATCH_ID" \
                    != "$DISPATCH_RUN_ID-$DISPATCH_RUN_ATTEMPT-recovery" \
                || ! "$PRODUCER_RUN_ID" =~ ^[1-9][0-9]*$ \
                || ! "$RELEASE_ID" =~ ^[1-9][0-9]*$ \
                || "$ASSET_INVENTORY" == null \
                || ! "$EXPECTED_COMMIT" =~ ^(none|[0-9a-f]{64})$ ]]; then
            echo "Invalid recovery dispatch payload" >&2
            exit 64
          fi
          IFS=. read -r version_major version_minor _ <<< "$RELEASE_VERSION"
          if [[ "$ASSET_SCHEMA" != binary-v1 ]] \
              || (( 10#$version_major < 2 \
                    || (10#$version_major == 2 && 10#$version_minor < 1) )); then
            echo "Unsupported recovery asset schema/version pair" >&2
            exit 64
          fi
          checked_out_verifier_sha="$(git rev-parse 'HEAD^{commit}')"
          git fetch --force --no-tags origin \
            "+refs/heads/main:refs/remotes/origin/main"
          if [[ "$checked_out_verifier_sha" \
                != "$(git rev-parse 'refs/remotes/origin/main^{commit}')" ]]; then
            echo "Recovery verifiers were not checked out from current public main" >&2
            exit 65
          fi
          git fetch --force --no-tags origin \
            "+refs/tags/$RELEASE_TAG:refs/ci/recovery-distribution"
          tag_distribution_sha="$(git rev-parse \
            'refs/ci/recovery-distribution^{commit}')"
          remote_tag_type="$(git cat-file -t refs/ci/recovery-distribution)"
          remote_tag_sha="$(git rev-parse refs/ci/recovery-distribution)"
          if [[ "$remote_tag_type" != commit \
                || "$remote_tag_sha" != "$tag_distribution_sha" ]] \
              || ! git merge-base --is-ancestor \
                  "$tag_distribution_sha" refs/remotes/origin/main; then
            echo "Recovery release tag is not a source-free public main commit" >&2
            exit 65
          fi
          tag_tree="$(git ls-tree -r --name-only refs/ci/recovery-distribution)"
          if grep -Eiq '(^|/)(src|tests?|external)(/|$)|\.(c|cpp|cc|cxx|h|hh|hpp|pro|ui|qrc)$|(^|/)CMakeLists\.txt$|(^|/)SOURCE[-_]GRAPH\.txt$' \
              <<< "$tag_tree" \
              || grep -Eq \
                "(^|/)MegaWhisper-$RELEASE_VERSION-source\\.tar\\.zst$|(^|/)MegaWhisper-Source-$RELEASE_VERSION\\.spdx\\.json$" \
                <<< "$tag_tree"; then
            echo "Recovery distribution tag contains application source material" >&2
            exit 65
          fi

          release_json="$(gh api \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")"
          release_id="$(jq -r '.id // empty' <<< "$release_json")"
          is_draft="$(jq -r '.draft' <<< "$release_json")"
          is_prerelease="$(jq -r '.prerelease' <<< "$release_json")"
          release_tag="$(jq -r '.tag_name // empty' <<< "$release_json")"
          release_target="$(jq -r '.target_commitish // empty' \
            <<< "$release_json")"
          if [[ "$release_id" != "$RELEASE_ID" \
                || "$release_tag" != "$RELEASE_TAG" \
                || "$release_target" != "$tag_distribution_sha" \
                || "$is_prerelease" != false \
                || ( "$is_draft" != true && "$is_draft" != false ) \
                || ( "$OPERATION" == restore && "$is_draft" != false ) ]]; then
            echo "Recovery release has an invalid state" >&2
            exit 65
          fi

          expected_assets="$(scripts/ci/list-release-assets.sh \
            "$RELEASE_VERSION" release)"
          api_asset_names="$(jq -r '.assets[].name' <<< "$release_json" \
            | LC_ALL=C sort)"
          api_asset_inventory="$(jq -Sc '
            [.assets[]
              | {
                  id: .id,
                  name: .name,
                  size: .size,
                  digest: .digest
                }
            ] | sort_by(.name)' <<< "$release_json")"
          dispatched_asset_inventory="$(jq -Sc 'sort_by(.name)' \
            <<< "$ASSET_INVENTORY")"
          expected_asset_count="$(wc -l <<< "$expected_assets")"
          if [[ "$expected_asset_count" != 10 \
                || "$api_asset_names" != "$expected_assets" \
                || "$api_asset_inventory" != "$dispatched_asset_inventory" ]] \
              || ! jq -e --argjson expected_count "$expected_asset_count" '
                length == $expected_count
                and all(.[];
                  (.id | type) == "number" and .id > 0
                  and (.name | type) == "string"
                  and (.name | test("^[A-Za-z0-9][A-Za-z0-9._+-]*$"))
                  and (.size | type) == "number" and .size > 0
                  and (.digest | type) == "string"
                  and (.digest | test("^sha256:[0-9a-f]{64}$")))' \
                <<< "$dispatched_asset_inventory" >/dev/null; then
            echo "Recovery release API inventory differs from dispatch" >&2
            exit 65
          fi

          mkdir -p release-assets
          while IFS=$'\t' read -r asset_id asset_name asset_state asset_size \
              asset_digest; do
            if [[ ! "$asset_id" =~ ^[1-9][0-9]*$ \
                  || ! "$asset_name" \
                      =~ ^[A-Za-z0-9][A-Za-z0-9._+-]*$ \
                  || "$asset_state" != uploaded \
                  || ! "$asset_size" =~ ^[1-9][0-9]*$ \
                  || ! "$asset_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Recovery release contains an invalid asset entry" >&2
              exit 65
            fi
            asset_path="release-assets/$asset_name"
            asset_downloaded=0
            for attempt in 1 2 3; do
              echo "Downloading $asset_name, attempt $attempt of 3"
              rm -f "$asset_path"
              if gh api --header 'Accept: application/octet-stream' \
                    "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
                    > "$asset_path" \
                  && [[ "$(stat -c '%s' "$asset_path")" == "$asset_size" ]] \
                  && [[ "sha256:$(sha256sum "$asset_path" \
                        | awk '{print $1}')" == "$asset_digest" ]]; then
                asset_downloaded=1
                break
              fi
            done
            if [[ "$asset_downloaded" -ne 1 ]]; then
              echo "Recovery release asset remained unavailable: $asset_name" >&2
              exit 69
            fi
          done < <(
            jq -r '.assets[]
              | [.id, .name, .state, .size, .digest]
              | @tsv' <<< "$release_json"
          )
          actual_assets="$(find release-assets -maxdepth 1 -type f \
            -printf '%f\n' | LC_ALL=C sort)"
          if [[ "$actual_assets" != "$expected_assets" ]]; then
            echo "Recovery release asset inventory is not exact" >&2
            diff -u <(printf '%s\n' "$expected_assets") \
              <(printf '%s\n' "$actual_assets") || true
            exit 65
          fi
          fingerprint="$(tr -d '[:space:]' < RELEASE_KEY_FINGERPRINT \
            | tr '[:lower:]' '[:upper:]')"
          if [[ ! "$fingerprint" =~ ^([0-9A-F]{40}|[0-9A-F]{64})$ ]]; then
            echo "Pinned recovery fingerprint has an invalid format" >&2
            exit 65
          fi
          scripts/ci/verify-release-signatures.sh \
            release-assets "$RELEASE_VERSION" "$ASSET_SCHEMA" "$fingerprint"

          compliance_root=third-party-compliance-assets
          mkdir -p "$compliance_root"
          scripts/ci/release-bundles.sh extract third-party-compliance \
            "$RELEASE_VERSION" \
            "release-assets/MegaWhisper-$RELEASE_VERSION-third-party-compliance.tar.zst" \
            "$compliance_root"
          if grep -REqI \
              -e 'SOURCE[-_]GRAPH\.txt' \
              -e "MegaWhisper-$RELEASE_VERSION-source\\.tar\\.zst" \
              -e "MegaWhisper-Source-$RELEASE_VERSION\\.spdx\\.json" \
              -e '(^|["[:space:]])[a-z_]*source[a-z_]*sha["=:]' \
              -e '/home/(runner|dx)/' \
              -e '/__w/[^/]+/[^/]+' "$compliance_root"; then
            echo "Third-party compliance metadata exposes application source identity" >&2
            exit 65
          fi

          recovery_root=recovery-assets
          mkdir -p "$recovery_root"
          scripts/ci/release-bundles.sh extract recovery \
            "$RELEASE_VERSION" \
            "release-assets/MegaWhisper-$RELEASE_VERSION-recovery.tar.zst" \
            "$recovery_root"
          metadata_file="$recovery_root/flatpak-pages-recovery.txt"
          declare -A metadata=()
          while IFS='=' read -r key value; do
            if [[ -z "$key" || -z "$value" \
                  || -n "${metadata[$key]+present}" ]]; then
              echo "Invalid or duplicate recovery metadata field: $key" >&2
              exit 65
            fi
            case "$key" in
              format|asset_schema|producer_run_id|release_repository|version|\
              flatpak_commit|archive_sha256|distribution_sha|\
              site_archive_sha256|rollback_commit|\
              rollback_archive_sha256|rollback_distribution_sha|\
              rollback_site_archive_sha256)
                metadata[$key]="$value"
                ;;
              *)
                echo "Unknown recovery metadata field: $key" >&2
                exit 65
                ;;
            esac
          done < "$metadata_file"
          for key in format asset_schema producer_run_id release_repository \
            version flatpak_commit archive_sha256 distribution_sha \
            site_archive_sha256 rollback_commit rollback_archive_sha256 \
            rollback_distribution_sha \
            rollback_site_archive_sha256; do
            if [[ -z "${metadata[$key]+present}" ]]; then
              echo "Missing recovery metadata field: $key" >&2
              exit 65
            fi
          done
          if [[ "${metadata[format]}" != 5 \
                || "${metadata[asset_schema]}" != binary-v1 \
                || "${metadata[producer_run_id]}" != "$PRODUCER_RUN_ID" \
                || "${metadata[release_repository]}" != "$GITHUB_REPOSITORY" \
                || "v${metadata[version]}" != "$RELEASE_TAG" \
                || ! "${metadata[flatpak_commit]}" =~ ^[0-9a-f]{64}$ \
                || ! "${metadata[archive_sha256]}" =~ ^[0-9a-f]{64}$ \
                || "${metadata[distribution_sha]}" != "$tag_distribution_sha" \
                || ! "${metadata[site_archive_sha256]}" =~ ^[0-9a-f]{64}$ \
                || ! "${metadata[rollback_commit]}" \
                    =~ ^(none|[0-9a-f]{64})$ \
                || ! "${metadata[rollback_archive_sha256]}" \
                    =~ ^[0-9a-f]{64}$ \
                || ! "${metadata[rollback_distribution_sha]}" \
                    =~ ^[0-9a-f]{40}$ \
                || ! "${metadata[rollback_site_archive_sha256]}" \
                    =~ ^[0-9a-f]{64}$ ]]; then
            echo "Signed recovery metadata does not match the dispatch" >&2
            exit 65
          fi

          if [[ "$OPERATION" == restore ]]; then
            if [[ "$EXPECTED_COMMIT" != "${metadata[flatpak_commit]}" ]]; then
              echo "Requested restore commit differs from signed metadata" >&2
              exit 65
            fi
            scripts/ci/verify-pages-recovery.sh \
              "$recovery_root" recovery-repo recovery-site \
              "$fingerprint" "$PRODUCER_RUN_ID" manifest
            scripts/ci/verify-flatpak-release-repo.sh \
              recovery-repo stable
            install -m 0644 "$recovery_root/flatpak-pages-recovery.txt" \
              recovery-repo/flatpak-active-state.txt
            install -m 0644 "$recovery_root/flatpak-pages-recovery.txt.asc" \
              recovery-repo/flatpak-active-state.txt.asc
            install -m 0644 "$recovery_root/megawhisper-release-key.asc" \
              recovery-repo/megawhisper-release-key.asc
            recovery_mode=release
          else
            if [[ "$EXPECTED_COMMIT" != "${metadata[rollback_commit]}" ]]; then
              echo "Requested rollback commit differs from signed metadata" >&2
              exit 65
            fi
            archive="$recovery_root/MegaWhisper-flatpak-rollback-repo.tar.zst"
            archive_sha256="$(sha256sum "$archive" | awk '{print $1}')"
            if [[ "$archive_sha256" \
                  != "${metadata[rollback_archive_sha256]}" ]]; then
              echo "Rollback archive differs from signed metadata" >&2
              exit 65
            fi
            scripts/ci/extract-recovery-archive.sh \
              "$archive" recovery-repo
            ostree fsck --repo=recovery-repo
            rollback_ref="$(ostree rev-parse --repo=recovery-repo \
              app/io.github.dxvsi.megawhisper/x86_64/stable \
              2>/dev/null || true)"
            if [[ "$EXPECTED_COMMIT" == none ]]; then
              if [[ -n "$rollback_ref" \
                    || -e recovery-repo/flatpak-active-state.txt \
                    || -e recovery-repo/flatpak-active-state.txt.asc ]]; then
                echo "Empty rollback repository exposes application state" >&2
                exit 65
              fi
            elif [[ "$rollback_ref" != "$EXPECTED_COMMIT" ]]; then
              echo "Rollback repository does not expose the requested commit" >&2
              exit 65
            fi
            if [[ "$EXPECTED_COMMIT" == none ]]; then
              scripts/ci/verify-flatpak-release-repo.sh \
                recovery-repo empty
            else
              scripts/ci/verify-flatpak-release-repo.sh \
                recovery-repo stable
            fi

            state_root="$(mktemp -d)"
            trap 'rm -rf "$state_root"' EXIT
            export HOME="$state_root/home"
            export XDG_DATA_HOME="$state_root/data"
            export XDG_CONFIG_HOME="$state_root/config"
            export XDG_CACHE_HOME="$state_root/cache"
            export XDG_RUNTIME_DIR="$state_root/runtime"
            install -d -m 0700 "$HOME" "$XDG_DATA_HOME" \
              "$XDG_CONFIG_HOME" "$XDG_CACHE_HOME" "$XDG_RUNTIME_DIR"
            flatpak remote-add --user \
              --gpg-import="$recovery_root/megawhisper-release-key.asc" \
              recovery-local "file://$GITHUB_WORKSPACE/recovery-repo"
            if [[ "$EXPECTED_COMMIT" == none ]]; then
              remote_refs="$(flatpak remote-ls --user --columns=ref \
                recovery-local)"
              if [[ -n "$remote_refs" ]]; then
                echo "Signed empty rollback exposes a Flatpak ref" >&2
                exit 65
              fi
            else
              verified_commit="$(flatpak remote-info --user --show-commit \
                recovery-local io.github.dxvsi.megawhisper)"
              if [[ "$verified_commit" != "$EXPECTED_COMMIT" ]]; then
                echo "Flatpak client rejected the rollback repository" >&2
                exit 65
              fi
            fi
            site_archive="$recovery_root/MegaWhisper-pages-rollback-site.tar.zst"
            site_archive_sha256="$(sha256sum "$site_archive" \
              | awk '{print $1}')"
            if [[ "$site_archive_sha256" \
                  != "${metadata[rollback_site_archive_sha256]}" ]]; then
              echo "Rollback site archive differs from signed metadata" >&2
              exit 65
            fi
            scripts/ci/extract-recovery-archive.sh \
              "$site_archive" recovery-site
            scripts/ci/verify-pages-site.sh \
              recovery-site rollback manifest
            recovery_mode=rollback
          fi
          scripts/ci/assemble-pages-state.sh \
            recovery-site recovery-repo recovery-pages \
            "$EXPECTED_COMMIT" "$recovery_mode"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"
          echo "mode=$recovery_mode" >> "$GITHUB_OUTPUT"

      - name: Configure public recovery deployment
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload verified complete recovery state
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: pages-recovery-${{ github.run_attempt }}
          path: recovery-pages
          retention-days: 1
          include-hidden-files: true

      - id: recovery-deployment
        name: Deploy verified complete recovery state
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: pages-recovery-${{ github.run_attempt }}

      - name: Verify live recovered site and repository
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ github.event.client_payload.flatpak_commit }}
          FINGERPRINT: ${{ steps.recovery-state.outputs.fingerprint }}
          RECOVERY_MODE: ${{ steps.recovery-state.outputs.mode }}
        run: |
          set -Eeuo pipefail
          # shellcheck disable=SC2153
          scripts/ci/verify-live-pages-state.sh \
            "$FLATPAK_REPO_URL" recovery-pages recovery-site "$FINGERPRINT" \
            "$EXPECTED_COMMIT" \
            "$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-recovery" \
            "$RECOVERY_MODE"
